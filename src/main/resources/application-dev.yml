#Development verison of the application configuration file

server:
  port: 8083

#databse connections
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root
    password: scott
    driver-class-name: com.mysql.cj.jdbc.Driver
##We have something as hikari connection pool which is used by spring boot to manage the connections to the database. We can configure the hikari connection pool properties in the application.properties file. The default values are good enough for most of the applications. But if you want to change the default values, you can do it in the application.properties file.
#  hikari:
#    maximum-pool-size: 10
#    minimum-idle: 5
#    idle-timeout: 30000
#    max-lifetime: 1800000
#    connection-timeout: 30000
#    leak-detection-threshold: 0
#    initialization-fail-timeout: -1
  #JPA and Hibernate configurations
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    format_sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect


security:
  jwt:
    secret: ${JWT_SECRET:mysecretkey}
    issuer: ${JWT_ISSUER:api.substring.com}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:86400}
    refresh-token-cookie-name: ${JWT_REFRESH_TOKEN_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}
